name: SignalNest Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger context
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch ref: ${{ github.ref }}"
          echo "Workflow run number: ${{ github.run_number }}"

      - name: Trigger SignalNest cron endpoint
        env:
          SIGNALNEST_CRON_URL: ${{ secrets.SIGNALNEST_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "SignalNest cron started at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if [ -z "$SIGNALNEST_CRON_URL" ]; then
            echo "Missing SIGNALNEST_CRON_URL secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          RESPONSE=$(curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SIGNALNEST_CRON_URL")

          echo "$RESPONSE"
          echo "SignalNest cron finished at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
